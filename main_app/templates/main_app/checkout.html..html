<div class="mb-4">
    <label class="form-label fw-bold">Quantity (kg)</label>

    <input type="number" name="quantity" id="quantityInput" class="form-control form-control-lg"
           value="{{ initial_qty }}" min="1" max="{{ crop.quantity_kg }}" step="0.5" required oninput="updateTotal()">

    <small class="text-muted">Enter amount to buy.</small>
</div>
<script>
    function updateTotal() {
        let price = parseFloat(document.getElementById('pricePerKg').innerText);
        let qty = parseFloat(document.getElementById('quantityInput').value);

        if (isNaN(qty) || qty < 0) { qty = 0; }

        let total = (price * qty).toFixed(2);
        document.getElementById('totalBtn').innerText = total;
    }

    // NEW: Run this automatically when page opens!
    window.onload = updateTotal;
</script>
