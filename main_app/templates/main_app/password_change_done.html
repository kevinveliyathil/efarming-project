{% extends 'main_app/base.html' %}
{% load static %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    body { background-color: #F3F4F6; font-family: 'Manrope', sans-serif; }
    
    .success-container {
        display: flex; align-items: center; justify-content: center;
        min-height: 80vh;
    }

    .success-card {
        background: white;
        padding: 50px 40px;
        border-radius: 24px;
        text-align: center;
        max-width: 450px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        animation: zoomIn 0.4s ease-out;
    }

    .icon-success {
        width: 90px; height: 90px;
        background: #D1FAE5;
        color: #10B981;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 3rem;
        margin: 0 auto 25px;
    }

    h2 { font-weight: 800; color: #1F2937; margin-bottom: 10px; }
    p { color: #6B7280; margin-bottom: 30px; line-height: 1.6; }

    .btn-home {
        background: #10B981; color: white;
        padding: 12px 30px; border-radius: 50px;
        text-decoration: none; font-weight: 700;
        transition: 0.3s; display: inline-block;
    }
    .btn-home:hover { background: #059669; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }
</style>

<div class="success-container">
    <div class="success-card">
        <div class="icon-success">
            <i class="fas fa-check"></i>
        </div>
        <h2>Success!</h2>
        <p>Your password has been changed successfully. You can now use your new password to log in.</p>
        <a href="{% url 'customer_dashboard' %}" class="btn-home">Back to Dashboard</a>
    </div>
</div>
{% endblock %}
